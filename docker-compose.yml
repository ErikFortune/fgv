# Docker Compose for Chocolate Lab development stack.
# Usage: docker compose up -d
#
# The app container serves both the React frontend and Node.js API
# from a single process. MongoDB provides persistent storage.

services:
  app:
    build:
      context: .
      dockerfile: services/chocolate-lab-api/Dockerfile
    environment:
      PORT: '3002'
      CHOCOLATE_LAB_STORAGE_TYPE: mongo
      MONGODB_CONNECTION_STRING: mongodb://mongo:27017
      MONGODB_DB_NAME: chocolate-lab
      MONGODB_DEFAULT_USER_ID: default-user
      STATIC_FILES_PATH: ./static
    ports:
      - '3002:3002'
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:8.0
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo-data:
