metadata:
  name: Flavors
items:
  cinnamon-ground:
    baseId: cinnamon-ground
    name: Cinnamon (Ground)
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 2
      milkFat: 0
      water: 10
      solids: 88
      otherFats: 0
    description: >-
      Ground cinnamon is a warm, sweet spice derived from the inner bark of Cinnamomum trees. Commonly used in chocolate
      confections to add depth and aromatic warmth. Available in two main varieties: Ceylon (true cinnamon, sweeter and
      more delicate) and Cassia (more common, stronger flavor). Ground cinnamon adds complexity to ganaches, pralines,
      and flavored chocolates.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - warming
      - aromatic
      - sweet
      - bark
      - ground
      - cassia
      - ceylon
    density: 0.56
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: Tbsp
        - id: pinch
      preferredId: tsp
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated for typical ground cinnamon: approximately 88% solids (fiber, carbohydrates,
          minerals), 10% residual moisture, 2% natural sugars. The composition can vary slightly between Ceylon and
          Cassia varieties. Density of 0.56 g/mL is an average for ground cinnamon powder. Most cinnamon used in
          chocolate work is Cassia variety unless specifically labeled as Ceylon. When using in ganache, typical dosage
          is 0.5-2% of total weight to avoid overpowering the chocolate.
    category: flavor
  cinnamon-whole:
    baseId: cinnamon-whole
    name: Cinnamon (Whole)
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 2
      milkFat: 0
      water: 10
      solids: 88
      otherFats: 0
    description: >-
      Whole cinnamon sticks (quills) from dried bark of Cinnamomum trees. Used for infusing creams, ganaches, and
      chocolate preparations. Provides warm, sweet, and slightly spicy aromatic notes. Typically steeped in hot liquid
      and removed before final preparation.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - aromatic
      - infusion
      - warm-spice
      - cinnamon
      - bark
      - whole-spice
      - flavoring
    density: 0.4
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: Tbsp
      preferredId: g
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated for dried whole cinnamon sticks: approximately 88% solids (cellulose,
          lignin, and aromatic compounds), 10% residual water, 2% natural sugars. These values represent the physical
          composition of the spice itself. In practice, whole cinnamon is typically infused into liquids (cream, milk)
          and then removed, so it contributes primarily aromatic compounds rather than mass to the final ganache. The
          density of 0.4 g/mL reflects the low density of dried bark pieces.
      - category: ai
        note: >-
          Two main types exist: Ceylon cinnamon (Cinnamomum verum, 'true cinnamon') with delicate, sweet flavor, and
          Cassia cinnamon (Cinnamomum cassia) with stronger, more pungent flavor. This entry represents whole sticks
          generically. For infusions, typical usage is 1-2 sticks per 250-500mL liquid, steeped for 10-30 minutes
          depending on desired intensity.
    category: flavor
  cardamom-whole:
    baseId: cardamom-whole
    name: Cardamom (Whole)
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 8
      solids: 90
      otherFats: 2
    description: >-
      Whole green cardamom pods containing aromatic black seeds. A highly fragrant spice with sweet, floral, and
      slightly eucalyptus-like notes. Native to India and commonly used in both sweet and savory applications. The pods
      can be infused whole into liquids or the seeds can be ground for more intense flavor.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - aromatic
      - cardamom
      - green-cardamom
      - infusion
      - indian-spice
      - whole-spice
      - pods
    density: 0.55
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: pods
      preferredId: pods
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated for whole cardamom pods: approximately 90% solids (fiber, carbohydrates,
          protein), 8% water content, 2% volatile oils/fats. These pods are typically used for infusion rather than
          direct incorporation into ganache. The essential oils contain terpenes and other aromatic compounds. Water
          content is based on typical dried spice moisture levels. For ganache applications, pods are usually steeped in
          cream or other liquids and then removed, so the actual contribution to final ganache composition would be
          minimal - primarily flavor compounds rather than mass.
      - category: ai
        note: >-
          Density estimated at 0.55 g/mL for whole pods, which are lightweight and contain hollow chambers. Individual
          pods typically weigh 0.3-0.5g each. For recipe purposes, measuring by pod count is more practical than weight.
    category: flavor
  cardamom-ground:
    baseId: cardamom-ground
    name: Cardamom (Ground)
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 8
      solids: 90
      otherFats: 2
    description: >-
      Ground cardamom is a warm, aromatic spice with sweet, floral, and slightly citrusy notes. It's derived from the
      seeds of cardamom pods and is commonly used in both sweet and savory applications. In chocolate making, it adds
      complexity and exotic flavor, pairing particularly well with dark chocolate, white chocolate, and ganaches.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - aromatic
      - warming
      - floral
      - citrus
      - middle-eastern
      - indian
      - exotic
    density: 0.55
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: Tbsp
        - id: pinch
      preferredId: tsp
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated based on typical composition of ground cardamom: approximately 8% moisture
          content, 2% volatile oils (counted as otherFats), and 90% solids (including fiber, carbohydrates, and
          minerals). These values are estimates for dried, ground cardamom spice. Density of 0.55 g/mL is typical for
          ground spices. Use sparingly in chocolate applications as cardamom has a strong, distinctive flavor -
          typically 0.5-2% by weight of the chocolate mass.
      - category: usage
        note: >-
          When incorporating into ganache or chocolate, bloom the cardamom in warm cream or fat first to extract maximum
          flavor. Start with small amounts (0.5-1% of total weight) and adjust to taste, as cardamom can quickly
          overpower other flavors. Pairs exceptionally well with orange, coffee, and rose flavors.
    category: flavor
  cloves-whole:
    baseId: cloves-whole
    name: Cloves (whole)
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 2
      milkFat: 0
      water: 9
      solids: 87
      otherFats: 2
    description: >-
      Whole dried flower buds of Syzygium aromaticum, offering an intense, warm, sweet, and slightly bitter flavor with
      aromatic notes. Used sparingly in chocolate confections for spiced ganaches, infusions, and specialty pralines.
      Should be infused in cream or other liquids and strained before use.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - aromatic
      - warm spice
      - infusion
      - whole spice
      - eugenol
      - holiday spice
      - clove
    density: 0.55
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: Tbsp
        - id: pinch
      preferredId: g
    urls: []
    notes:
      - category: ai
        note: >-
          GanacheCharacteristics estimated based on typical composition of whole dried cloves: approximately 87% total
          solids (including fiber, volatile oils, and other dry matter), 9% moisture, 2% essential oils (counted as
          otherFats), and 2% natural sugars. Cloves contain 15-20% essential oils by weight, but for ganache
          calculations the volatile oil component is estimated conservatively at 2%. Density estimated at 0.55 g/mL for
          whole cloves in loose form. This ingredient should be used for infusion purposes only and strained out before
          incorporating into ganache.
      - category: ai
        note: >-
          Usage recommendation: Typically infused at 1-3 whole cloves per 100g of cream or liquid, then strained. Direct
          incorporation into ganache is not recommended due to the hard, woody texture of whole cloves.
    category: flavor
  cloves-ground:
    baseId: cloves-ground
    name: Cloves (Ground)
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 2
      milkFat: 0
      water: 9
      solids: 87
      otherFats: 2
    description: >-
      Ground cloves are a warm, aromatic spice derived from the dried flower buds of the clove tree (Syzygium
      aromaticum). They have an intensely pungent, sweet-spicy flavor with notes of pepper and a slightly bitter
      undertone. Used sparingly in chocolate applications to add warmth and complexity, particularly in spiced ganaches,
      truffles, and holiday confections. Pairs well with cinnamon, nutmeg, and orange.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - aromatic
      - warming
      - holiday
      - traditional
      - pungent
      - eugenol
      - asian-spice
      - indonesian
      - madagascar
    density: 0.55
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: Tbsp
        - id: pinch
      preferredId: tsp
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated based on typical composition of ground cloves: primarily fiber and
          carbohydrates (solids ~87%), residual moisture (~9%), small amounts of natural sugars (~2%), and essential
          oils containing eugenol (~2% as otherFats). Density of 0.55 g/mL is typical for ground spices. Use very
          sparingly in chocolate applications (typically 0.1-0.3% of total recipe weight) as the flavor is extremely
          potent and can easily overpower chocolate. Cloves contain 15-20% essential oils by weight, with eugenol being
          the primary aromatic compound.
      - category: ai
        note: >-
          Usage recommendation: In ganaches, start with 0.1-0.2g per 100g of chocolate. Cloves work particularly well
          with dark chocolate (65-75% cacao), orange, cinnamon, cardamom, and ginger. Allow flavors to infuse in warm
          cream for 10-15 minutes before straining for best results, or add directly to ganache in very small quantities
          for a more pronounced spice presence.
    category: flavor
  nutmeg-whole:
    baseId: nutmeg-whole
    name: Nutmeg (Whole)
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 8
      solids: 85
      otherFats: 7
    description: >-
      Whole nutmeg seeds from the Myristica fragrans tree, prized for their warm, sweet, and slightly spicy aromatic
      profile. Used in chocolate making by grating fresh or grinding to release volatile oils that complement chocolate,
      caramel, and cream-based preparations. Whole nutmeg retains potency far longer than pre-ground.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - aromatic
      - warm spice
      - baking spice
      - whole spice
      - grating spice
    density: 0.55
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: seeds
      preferredId: seeds
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated for whole nutmeg seed: approximately 85% solids (cellulose, proteins,
          carbohydrates), 7% other fats (volatile oils including myristicin), and 8% residual water. These values
          represent the dried whole seed composition. Density estimated at 0.55 g/mL for whole nutmeg seeds. When used
          in chocolate applications, nutmeg is typically grated fresh in very small quantities for flavoring rather than
          incorporated as a bulk ingredient.
    category: flavor
  nutmeg-ground:
    baseId: nutmeg-ground
    name: Nutmeg (Ground)
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 5
      milkFat: 0
      water: 8
      solids: 85
      otherFats: 2
    description: >-
      Ground nutmeg is a warm, aromatic spice derived from the seed of the Myristica fragrans tree. It has a sweet,
      nutty flavor with hints of clove and is commonly used in baking and confectionery. In chocolate applications, it
      adds depth and complexity, particularly in ganaches, truffles, and spiced chocolate creations.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - warm
      - aromatic
      - baking
      - flavoring
      - traditional
    density: 0.45
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: Tbsp
        - id: pinch
      preferredId: tsp
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated based on typical ground nutmeg composition: primarily carbohydrates and
          fiber (solids ~85%), small amounts of natural sugars (~5%), moisture content (~8%), and essential oils/fats
          (~2%). Nutmeg contains approximately 25-40% fixed oils in whole form, but ground nutmeg has lower fat content
          due to processing and oxidation. Density estimated at 0.45 g/mL for ground spice. Use sparingly in chocolate
          applications as nutmeg has a potent flavor that can easily overpower other ingredients.
    category: flavor
  lebkuchen-spice:
    baseId: lebkuchen-spice
    name: Lebkuchen Spice
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 8
      solids: 92
      otherFats: 0
    description: >-
      Traditional German gingerbread spice blend typically containing cinnamon, cloves, allspice, coriander, cardamom,
      ginger, nutmeg, and mace. Used in holiday baking and confections, particularly lebkuchen (German gingerbread).
      Adds warm, aromatic, and slightly sweet spice notes to chocolates, ganaches, and baked goods.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - spice-blend
      - german
      - christmas
      - holiday
      - gingerbread
      - lebkuchen
      - warming-spices
      - aromatic
      - baking-spice
    density: 0.55
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: Tbsp
        - id: pinch
      preferredId: tsp
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated based on typical ground spice blend composition: predominantly dry solids
          (92%) with minimal residual moisture (8%). Density of 0.55 g/mL is typical for ground spice blends. Exact
          composition may vary by manufacturer and blend recipe. Traditional lebkuchen spice typically includes
          cinnamon, cloves, allspice, coriander, cardamom, ginger, nutmeg, and mace, though proportions and exact
          ingredients vary by recipe and regional tradition.
    category: flavor
  aztec-spice:
    baseId: aztec-spice
    name: Aztec Spice
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 8
      solids: 92
      otherFats: 0
    description: >-
      A warming spice blend inspired by traditional Aztec chocolate beverages, typically combining cinnamon, chili
      pepper, and sometimes vanilla, nutmeg, or allspice. Used to add complex heat and aromatic depth to chocolate
      confections, ganaches, and drinking chocolate.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - aztec
      - mexican
      - cinnamon
      - chili
      - warming
      - traditional
      - heat
      - aromatic
    density: 0.55
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: Tbsp
        - id: pinch
      preferredId: tsp
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated for a typical dried spice blend: primarily solids (ground spices) with
          minimal residual water content. Actual composition may vary based on specific blend ingredients and freshness.
          The 92% solids represents the dried spice matter, while 8% water accounts for typical moisture content in
          dried spices.
      - category: ai
        note: >-
          Density estimated at 0.55 g/mL, which is typical for ground spice blends. Actual density may vary depending on
          grind size and specific spice composition.
      - category: ai
        note: >-
          Allergen information assumes a pure spice blend without cross-contamination. Users should verify with
          manufacturer if using a commercial blend, as processing facilities may introduce trace allergens.
    category: flavor
  chai-spice:
    baseId: chai-spice
    name: Chai Spice
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 8
      solids: 90
      otherFats: 2
    description: >-
      A warming blend of aromatic spices traditionally used in chai tea, typically including cinnamon, cardamom, ginger,
      cloves, and black pepper. Perfect for infusing into ganaches, creams, and chocolate fillings to create exotic,
      spiced flavor profiles.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - chai
      - warming
      - aromatic
      - cinnamon
      - cardamom
      - ginger
      - cloves
      - infusion
      - blend
    density: 0.55
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: Tbsp
        - id: pinch
      preferredId: tsp
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated for a typical chai spice blend composition: approximately 90% solids (ground
          spices), 8% residual water content, and 2% volatile oils. Density estimated at 0.55 g/mL for ground spice
          blend. Actual composition may vary significantly based on specific blend ratios and grinding fineness. For
          chocolate applications, this spice blend is typically infused into cream or other liquids rather than added
          directly to chocolate.
      - category: usage
        note: >-
          Best used by infusing into warm cream or milk for 10-15 minutes, then straining before incorporating into
          ganache. Can also be ground finely and added directly in small quantities (0.5-2% of total recipe weight) for
          more pronounced flavor.
    category: flavor
  coffee-beans:
    baseId: coffee-beans
    name: Coffee Beans
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 2
      solids: 98
      otherFats: 0
    description: >-
      Whole roasted coffee beans used to infuse flavor into ganaches, creams, and chocolate preparations. Can be steeped
      in dairy or cream to extract coffee flavor and aroma. Common varieties include Arabica and Robusta beans from
      various origins.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - coffee
      - infusion
      - aromatic
      - beans
      - whole
      - roasted
      - flavor-infusion
    density: 0.65
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: Tbsp
      preferredId: g
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics represent roasted whole coffee beans. The composition is approximately 98% dry solids
          (including oils, proteins, carbohydrates, fiber, and caffeine) and 2% residual moisture. Coffee beans contain
          natural oils (10-15% of weight) which are included in the solids percentage rather than separated out as
          'otherFats' since they remain bound within the bean structure when used whole for infusion. When using coffee
          beans in ganache, they are typically steeped in cream/dairy and then strained out, so the actual contribution
          to the final ganache depends on extraction efficiency and infusion time.
      - category: ai
        note: >-
          Density estimated at 0.65 g/mL for whole roasted coffee beans (bulk density). Individual bean density may vary
          based on roast level and origin.
    category: flavor
  thai-tea:
    baseId: thai-tea
    name: Thai Tea
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 5
      solids: 94
      otherFats: 1
    description: >-
      Thai tea is a strongly brewed black tea blend, typically featuring Ceylon or Assam tea mixed with spices like star
      anise, cardamom, and sometimes vanilla or tamarind. Known for its distinctive orange color (often from food
      coloring in commercial versions) and sweet, creamy, spiced flavor profile. When used in chocolate applications, it
      provides aromatic, floral, and slightly spiced notes.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - tea
      - thai
      - spiced
      - aromatic
      - infusion
      - asian
      - floral
      - black-tea
    density: 0.35
    phase: solid
    measurementUnits:
      options:
        - id: g
        - id: tsp
        - id: Tbsp
      preferredId: g
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated for dried Thai tea leaves/powder: assumed minimal moisture (5% water),
          predominantly tea solids (94%), trace natural oils (1%). The composition can vary based on whether this is
          pure tea leaves, a pre-mixed blend with spices, or includes added sugar/creamer (this assumes pure tea). For
          infusion use in ganache, the tea would typically be steeped in cream or liquid, extracting flavor compounds
          while the solids are strained out.
      - category: ai
        note: >-
          Density estimated at 0.35 g/mL for loose dried tea leaves. Thai tea blends vary widely - some are pure tea,
          others include sugar, food coloring, and spices pre-mixed. This entry assumes a basic dried tea blend without
          added sugar or dairy, suitable for infusing into chocolate ganache or cream.
    category: flavor
  yuzu-extract:
    baseId: yuzu-extract
    name: Yuzu Extract
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 5
      milkFat: 0
      water: 75
      solids: 15
      otherFats: 5
    description: >-
      A concentrated extract made from yuzu, a Japanese citrus fruit with a distinctive tart, floral, and aromatic
      flavor profile. Yuzu extract captures the essence of the fruit's zest and juice, providing intense citrus notes
      with hints of grapefruit, mandarin, and bergamot. Commonly used in ganaches, creams, and fillings to add bright,
      complex citrus flavor to chocolate confections.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - citrus
      - japanese
      - asian
      - extract
      - flavoring
      - yuzu
      - aromatic
      - tart
      - floral
    density: 1.05
    phase: liquid
    measurementUnits:
      options:
        - id: g
        - id: mL
        - id: tsp
        - id: Tbsp
      preferredId: mL
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics are estimates based on typical extract compositions. Yuzu extract is primarily
          water-based with some dissolved solids (citrus oils, aromatics, flavor compounds), minimal natural sugars from
          the fruit, and trace amounts of natural citrus oils. The exact composition varies significantly by
          manufacturer and extraction method (alcohol-based vs. water-based vs. oil-based). This assumes a water-based
          extract with some alcohol or oil carrier. Commercial extracts may contain additional ingredients like alcohol
          (as preservative/carrier), natural flavors, or citric acid. Density estimate is slightly higher than water due
          to dissolved solids and oils. Use sparingly as the flavor is highly concentrated.
    category: flavor
  vietnamese-coffee-concentrate:
    baseId: vietnamese-coffee-concentrate
    name: Vietnamese Coffee Concentrate
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 85
      solids: 15
      otherFats: 0
    description: >-
      A strong, concentrated coffee extract made from Vietnamese robusta coffee beans, typically prepared using the
      traditional phin filter method. This concentrate delivers intense coffee flavor with characteristic bold, earthy
      notes and slight bitterness. Often used in ganaches, truffles, and coffee-flavored confections.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - coffee
      - vietnamese
      - concentrate
      - extract
      - robusta
      - beverage
      - flavoring
      - liquid-flavoring
    density: 1.02
    phase: liquid
    measurementUnits:
      options:
        - id: mL
        - id: g
        - id: tsp
        - id: Tbsp
      preferredId: mL
    urls: []
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated based on typical coffee concentrate composition: approximately 85% water and
          15% coffee solids (including caffeine, chlorogenic acids, and other extracted compounds). Actual composition
          may vary based on brewing method, concentration ratio, and bean variety. Density estimated at 1.02 g/mL for
          concentrated coffee extract. Vietnamese coffee concentrate is traditionally made strong, so this assumes a 3:1
          to 4:1 concentration ratio compared to regular brewed coffee.
      - category: ai
        note: >-
          This ingredient is categorized as 'flavor' rather than 'liquid' because its primary function in
          chocolate-making is flavoring rather than hydration, though it does contribute water content to ganache
          formulations. When calculating water activity and shelf life, the water content (85%) should be factored into
          ganache recipes.
    category: flavor
  taijin-spice-mix:
    baseId: taijin-spice-mix
    name: Taijin Spice Mix
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 4
      solids: 96
      otherFats: 0
    description: >-
      Taijin (commonly known as Tajín) Clásico is a unique Mexican seasoning blend made from mild chili peppers, sea
      salt, citric acid, dehydrated lime juice, and silicon dioxide (anti-caking agent). It provides a tangy, mildly
      spicy flavor, popular for fruits, snacks, rims on cocktails, and as a topping or flavor enhancer in chocolate
      confections like truffles, bars, and ganache for a chili-lime kick.
    manufacturer: Tajín
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spice
      - seasoning
      - chili-lime
      - mexican
      - tajin
      - chili
      - lime
      - salt
