  guittard-onyx-72:
    baseId: guittard-onyx-72
    name: Onyx 72
    ganacheCharacteristics:
      cacaoFat: 40
      sugar: 28
      milkFat: 0
      water: 1
      solids: 31
      otherFats: 0
    description: >-
      Guittard Onyx 72% is a deep, rich, bittersweet dark chocolate with an unsurpassed intense chocolate flavor, ideal
      for general-purpose use in ganache, molding, enrobing, and baking.
    manufacturer: Guittard
    allergens:
      - soy
    traceAllergens:
      - milk
    certifications:
      - gluten-free
      - kosher
      - non-gmo
    vegan: false
    tags:
      - bittersweet
      - dark
      - wafers
      - couverture
    density: 1.3
    phase: solid
    notes:
      - category: ai
        note: >-
          cacaoFat set to 40% based on product listing as 40% fat (primarily cocoa butter in high-cacao dark chocolate).
          sugar estimated as ~28% (100-72=28, typical for minimal non-cocoa ingredients). solids roughly estimated as
          non-fat cocoa solids ~31%. milkFat and otherFats at 0 as it's dark chocolate with no milk or added fats. water
          low at ~1% typical for couverture. Viscosity 130 McM from one retailer source. Fluidity estimated as medium (3
          stars) given general-purpose use and not listed as high-fluidity. Trace milk allergen due to shared equipment.
          Not vegan due to possible dairy trace and vanilla (often non-vegan).
    category: chocolate
    chocolateType: dark
    cacaoPercentage: 72
    fluidityStars: 3
    viscosityMcM: 130
    temperatureCurve:
      melt: 45
    origins:
      - Côte d'Ivoire
      - Ghana
    beanVarieties:
      - Blend
    applications:
      - baking
      - confectionary
      - ganache
      - molding
      - enrobing
      - pralines
