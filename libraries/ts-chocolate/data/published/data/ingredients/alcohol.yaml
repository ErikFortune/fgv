  gin:
    baseId: gin
    name: Gin
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 60
      solids: 0
      otherFats: 40
    description: >-
      A distilled alcoholic spirit flavored primarily with juniper berries and various botanicals. Gin adds aromatic
      complexity and helps preserve ganaches while lowering water activity. The botanical notes can complement
      chocolate, particularly dark chocolate with citrus or floral profiles.
    allergens: []
    traceAllergens: []
    certifications: []
    vegan: true
    tags:
      - spirit
      - botanical
      - juniper
      - alcohol
      - liquor
      - ganache-ingredient
      - preservation
    density: 0.95
    phase: liquid
    measurementUnits:
      options:
        - id: mL
        - id: Tbsp
        - id: tsp
      preferredId: mL
    urls: []
    notes:
      - category: ai
        note: >-
          Assumed standard gin at 40% ABV (80 proof), which is the most common strength. Premium gins may range from
          37.5% to 47% ABV. For ganache characteristics: 60% water, 40% classified as 'otherFats' (representing the
          alcohol/ethanol component since there is no dedicated alcohol field in the schema). Actual botanical extract
          content is minimal (<1%). Density estimated at 0.95 g/mL for 40% ABV ethanol-water mixture.
      - category: usage
        note: >-
          When using gin in ganache, alcohol content affects shelf stability and texture. Typically used at 5-10% of
          total ganache weight. Alcohol inhibits crystallization and reduces water activity, extending shelf life.
          Consider that alcohol will not fully evaporate in ganache applications.
    category: alcohol
    alcoholByVolume: 40
    flavorProfile: >-
      Juniper-forward with botanical notes including coriander, citrus peel, angelica root, and various herbs and
      spices. Flavor varies significantly by brand and style (London Dry, Plymouth, Old Tom, etc.).
