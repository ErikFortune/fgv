  amarula-cream-liqueur:
    baseId: amarula-cream-liqueur
    name: Amarula Cream Liqueur
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 14
      milkFat: 8
      water: 60
      solids: 3
      otherFats: 15
    description: >-
      A cream liqueur from South Africa made from the fruit of the marula tree (Sclerocarya birrea). The liqueur has a
      smooth, creamy texture with flavors of caramel, vanilla, and exotic fruit. The marula fruit is fermented and
      distilled, then blended with cream and aged in oak barrels for two years.
    manufacturer: Distell Group Limited
    allergens:
      - milk
    traceAllergens: []
    certifications: []
    vegan: false
    tags:
      - cream liqueur
      - south african
      - marula
      - liqueur
      - alcohol
      - dairy liqueur
      - exotic fruit
    density: 1.05
    phase: liquid
    measurementUnits:
      options:
        - id: mL
        - id: g
        - id: Tbsp
        - id: tsp
      preferredId: mL
    urls:
      - category: manufacturer
        url: https://www.amarula.com
    notes:
      - category: ai
        note: >-
          Ganache characteristics estimated based on typical cream liqueur composition: approximately 17% ABV
          (alcohol/water mix ~60% water), cream content contributing ~8% milk fat and ~15% other fats, sugar content
          ~14%, and remaining solids ~3%. These percentages are estimates based on standard cream liqueur formulations
          and may vary slightly from the actual product composition.
      - category: ai
        note: >-
          Density estimated at 1.05 g/mL based on typical cream liqueur density, which is slightly higher than water due
          to sugar and cream content but lower than pure cream due to alcohol content.
      - category: usage
        note: >-
          When using in ganache, the alcohol and high water content must be carefully balanced. The cream component adds
          richness but also increases perishability. Consider reducing other liquid ingredients proportionally.
    category: alcohol
    alcoholByVolume: 17
    flavorProfile: >-
      Rich and creamy with notes of caramel, vanilla, and exotic marula fruit. Smooth texture with a sweet finish and
      subtle hints of toasted oak from barrel aging.
