    density: 1.03
    category: liquid
  ghee-clarified-butter:
    baseId: ghee-clarified-butter
    name: Ghee (Clarified Butter)
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 99
      water: 0
      solids: 1
      otherFats: 0
    description: >-
      Ghee is clarified butter in which milk solids and water have been removed, resulting in a pure butterfat product
      with a rich, nutty flavor. Commonly used in confectionery and ganache for its high fat content and clean dairy
      notes.
    allergens:
      - milk
    tags:
      - clarified-butter
      - butterfat
      - anhydrous-fat
    density: 0.91
    category: fat
    meltingPoint: 32
