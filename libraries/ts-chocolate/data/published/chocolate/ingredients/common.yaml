      - unsweetened
    density: 1.03
    category: liquid
  raspberry-puree-himbeermark:
    baseId: raspberry-puree-himbeermark
    name: Raspberry Puree (Himbeermark)
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 5
      milkFat: 0
      water: 83
      solids: 12
      otherFats: 0
    description: >-
      Seedless, finely pureed raspberries (Himbeermark in German), unsweetened fruit puree made by crushing and
      straining fresh or processed raspberries to remove seeds and fibers. Commonly used in German baking for fillings,
      mousses, sauces, tortes, or as a flavoring in creams and ganache.
    certifications:
      - vegan
    vegan: true
    tags:
      - fruit
      - puree
      - unsweetened
      - seedless
    density: 1.05
    category: liquid
  corn-syrup:
    baseId: corn-syrup
    name: Corn Syrup
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 78
      milkFat: 0
      water: 22
      solids: 0
      otherFats: 0
    description: >-
      Light corn syrup (also known as glucose syrup from corn starch hydrolysis) — a viscous, clear sweetener primarily
      composed of glucose, maltose, and higher oligosaccharides. Used in ganache and confections to inhibit sugar
      crystallization, improve smoothness, add body, and extend shelf life. Typically unsweetened beyond its own sugars,
      with no added flavors.
    certifications:
      - vegan
    vegan: true
    tags:
      - sweetener
      - glucose-syrup
      - anti-crystallization
      - confectionery
    density: 1.38
    category: liquid
  cocoa-butter:
    baseId: cocoa-butter
    name: Cocoa Butter
    ganacheCharacteristics:
      cacaoFat: 100
      sugar: 0
      milkFat: 0
      water: 0
      solids: 0
      otherFats: 0
    description: >-
      Pure edible fat extracted from cocoa beans (Theobroma cacao), consisting almost entirely of triglycerides
      (primarily saturated and monounsaturated fats like stearic, oleic, and palmitic acids). Pale yellow, solid at room
      temperature with a melting point around 34-38°C, used in ganache to thin mixtures, enhance snap/crispness, add
      gloss, and stabilize emulsions. Neutral flavor (deodorized versions) or mild cocoa aroma.
    certifications:
      - vegan
    vegan: true
    tags:
      - fat
      - cacao-fat
      - chocolate-making
      - tempering
      - vegan-fat
    density: 0.9
    category: fat
    meltingPoint: 35
