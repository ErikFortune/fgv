      water: 0
      solids: 100
      otherFats: 0
    description: >-
      A powdered acid blend typically used in confectionery to adjust acidity, enhance fruit flavors, or provide
      tartness. Common formulations include citric acid, malic acid, or a mixture of food-grade acids.
