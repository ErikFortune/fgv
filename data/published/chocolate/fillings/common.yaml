metadata:
  name: Common Recipes
  description: Seed data ganache recipes for the recipes library
items:
  dark-ganache-classic:
    baseId: dark-ganache-classic
    name: Classic Dark Ganache
    category: ganache
    description: >-
      Traditional dark chocolate ganache with 64% couverture. Rich, intense chocolate flavor perfect for truffles and
      bonbon fillings.
    tags:
      - classic
      - dark
      - truffle
      - bonbon
    variations:
      - variationSpec: 2026-01-01-01
        createdDate: '2026-01-01'
        ingredients:
          - ingredient:
              ids:
                - cacao-barry.guayaquil-64
                - common.chocolate-dark-64
                - felchlin.arriba-72
              preferredId: cacao-barry.guayaquil-64
            amount: 400
          - ingredient:
              ids:
                - common.heavy-cream-36
              preferredId: common.heavy-cream-36
            amount: 200
          - ingredient:
              ids:
                - common.butter-82
              preferredId: common.butter-82
            amount: 20
            notes:
              - category: user
                note: Added at 35°C for shine
        baseWeight: 620
        yield: ~50 bonbons
        notes:
          - category: user
            note: Standard 2:1 ratio with butter finish
        procedures:
          options:
            - id: common.ganache-cold-method
            - id: common.ganache-hot-method
          preferredId: common.ganache-cold-method
      - variationSpec: 2026-02-13-01
        createdDate: '2026-02-13'
        ingredients:
          - ingredient:
              ids:
                - cacao-barry.guayaquil-64
                - common.chocolate-dark-64
                - felchlin.arriba-72
              preferredId: cacao-barry.guayaquil-64
            amount: 300
          - ingredient:
              ids:
                - common.heavy-cream-36
              preferredId: common.heavy-cream-36
            amount: 150
          - ingredient:
              ids:
                - common.butter-82
              preferredId: common.butter-82
            amount: 15
            notes:
              - category: user
                note: Added at 35°C for shine
        baseWeight: 465
        yield: ~50 bonbons
        notes:
          - category: user
            note: Standard 2:1 ratio with butter finish
        procedures:
          options:
            - id: common.ganache-cold-method
            - id: common.ganache-hot-method
          preferredId: common.ganache-cold-method
    goldenVariationSpec: 2026-01-01-01
  milk-ganache-classic:
    baseId: milk-ganache-classic
    name: Classic Milk Ganache
    category: ganache
    description: Smooth milk chocolate ganache with caramel notes. Higher chocolate ratio compensates for milk solids.
    tags:
      - classic
      - milk
      - truffle
      - bonbon
    variations:
      - variationSpec: 2026-01-01-01
        createdDate: '2026-01-01'
        ingredients:
          - ingredient:
              ids:
                - guittard.soleil-dor-38
              preferredId: guittard.soleil-dor-38
            amount: 350
          - ingredient:
              ids:
                - common.heavy-cream-36
              preferredId: common.heavy-cream-36
            amount: 200
          - ingredient:
              ids:
                - common.butter-82
              preferredId: common.butter-82
            amount: 20
            notes:
              - category: user
                note: Added at 35°C for shine
        baseWeight: 570
        yield: ~45 bonbons
        notes:
          - category: user
            note: 1.75:1 ratio for proper set with milk chocolate
        procedures:
          options:
            - id: common.ganache-cold-method
            - id: common.ganache-hot-method
          preferredId: common.ganache-cold-method
    goldenVariationSpec: 2026-01-01-01
  white-ganache-classic:
    baseId: white-ganache-classic
    name: Classic White Ganache
    category: ganache
    description: >-
      Delicate white chocolate ganache with creamy vanilla notes. Higher chocolate ratio needed for proper emulsion and
      set.
    tags:
      - classic
      - white
      - truffle
      - bonbon
    variations:
      - variationSpec: 2026-01-01-01
        createdDate: '2026-01-01'
        ingredients:
          - ingredient:
              ids:
                - cacao-barry.zephyr-white-34
              preferredId: cacao-barry.zephyr-white-34
            amount: 500
          - ingredient:
              ids:
                - common.heavy-cream-36
              preferredId: common.heavy-cream-36
            amount: 200
          - ingredient:
              ids:
                - common.butter-82
              preferredId: common.butter-82
            amount: 15
            notes:
              - category: user
                note: Added at 32°C for shine
        baseWeight: 715
        yield: ~55 bonbons
        notes:
          - category: user
            note: 2.5:1 ratio essential for white chocolate emulsion
        procedures:
          options:
            - id: common.ganache-cold-method
            - id: common.ganache-hot-method
          preferredId: common.ganache-cold-method
    goldenVariationSpec: 2026-01-01-01
  vegan-ganache-coconut-cream:
    baseId: vegan-ganache-coconut-cream
    name: Vegan Ganache (Coconut Cream)
    category: ganache
    description: Dairy-free ganache using full-fat coconut cream. Subtle coconut undertones complement the dark chocolate.
    tags:
      - vegan
      - dairy-free
      - dark
      - coconut
    variations:
      - variationSpec: 2026-01-01-01
        createdDate: '2026-01-01'
        ingredients:
          - ingredient:
              ids:
                - cacao-barry.guayaquil-64
            amount: 400
          - ingredient:
              ids:
                - common.coconut-cream
            amount: 200
            notes:
              - category: user
                note: Use full-fat, refrigerate and use solid portion
        baseWeight: 600
        yield: ~48 bonbons
        notes:
          - category: user
            note: Coconut cream provides fat and moisture similar to dairy cream
        procedures:
          options:
            - id: common.ganache-cold-method
            - id: common.ganache-hot-method
          preferredId: common.ganache-cold-method
    goldenVariationSpec: 2026-01-01-01
  vegan-ganache-coconut-oil:
    baseId: vegan-ganache-coconut-oil
    name: Vegan Ganache (Coconut Oil)
    category: ganache
    description: Dairy-free ganache using coconut oil and water. Neutral flavor profile lets chocolate shine.
    tags:
      - vegan
      - dairy-free
      - dark
      - neutral
    variations:
      - variationSpec: 2026-01-01-01
        createdDate: '2026-01-01'
        ingredients:
          - ingredient:
              ids:
                - cacao-barry.guayaquil-64
              preferredId: cacao-barry.guayaquil-64
            amount: 400
          - ingredient:
              ids:
                - common.coconut-oil-deodorized
              preferredId: common.coconut-oil-deodorized
            amount: 150
            notes:
              - category: user
                note: Melted, at 35°C
          - ingredient:
              ids:
                - common.glucose-de43
              preferredId: common.glucose-de43
            amount: 30
            notes:
              - category: user
                note: For texture and shelf life
        baseWeight: 580
        yield: ~46 bonbons
        notes:
          - category: user
            note: Oil-based method gives firmer set and neutral flavor
        procedures:
          options:
            - id: common.ganache-cold-method
            - id: common.ganache-hot-method
          preferredId: common.ganache-cold-method
    goldenVariationSpec: 2026-01-01-01
  caramelized-ganache:
    baseId: caramelized-ganache
    name: Caramelized Ganache
    category: ganache
    description: Luxurious ganache made with caramelized white chocolate. Notes of dulce de leche and salted caramel.
    tags:
      - caramelized
      - blonde
      - truffle
      - bonbon
      - salted-caramel
    variations:
      - variationSpec: 2026-01-01-01
        createdDate: '2026-01-01'
        ingredients:
          - ingredient:
              ids:
                - cacao-barry.zephyr-caramel-35
              preferredId: cacao-barry.zephyr-caramel-35
            amount: 450
          - ingredient:
              ids:
                - common.heavy-cream-36
              preferredId: common.heavy-cream-36
            amount: 180
          - ingredient:
              ids:
                - common.butter-82
              preferredId: common.butter-82
            amount: 20
            notes:
              - category: user
                note: Salted butter works beautifully here
        baseWeight: 650
        yield: ~52 bonbons
        notes:
          - category: user
            note: Slightly higher chocolate ratio for caramelized varieties
        procedures:
          options:
            - id: common.ganache-cold-method
            - id: common.ganache-hot-method
          preferredId: common.ganache-cold-method
    goldenVariationSpec: 2026-01-01-01
  gianduja-basic:
    baseId: gianduja-basic
    name: Basic Gianduja
    category: gianduja
    description: Classic Italian hazelnut-chocolate combination. Smooth, nutty, and luxurious.
    tags:
      - gianduja
      - hazelnut
      - italian
      - praline
    variations:
      - variationSpec: 2026-01-01-01
        createdDate: '2026-01-01'
        ingredients:
          - ingredient:
              ids:
                - felchlin.sao-palme-43
            amount: 300
          - ingredient:
              ids:
                - common.hazelnut-paste
            amount: 200
            notes:
              - category: user
                note: 100% roasted hazelnuts, finely ground
          - ingredient:
              ids:
                - common.butter-82
            amount: 50
            notes:
              - category: user
                note: For smoothness
        baseWeight: 550
        yield: ~44 bonbons
        notes:
          - category: user
            note: Traditional 60:40 chocolate to hazelnut ratio
        procedures:
          options:
            - id: common.gianduja
          preferredId: common.gianduja
    goldenVariationSpec: 2026-01-01-01
