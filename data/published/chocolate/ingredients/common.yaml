    name: Soy Milk
    ganacheCharacteristics:
      cacaoFat: 0
      sugar: 0
      milkFat: 0
      water: 92
      solids: 6
      otherFats: 2
    description: >-
      Plant-based milk alternative made from soybeans and water, typically unsweetened with around 3-4% protein, low
      fat, and high water content. Used in vegan ganache as a dairy cream substitute.
    allergens:
      - soy
    certifications:
      - vegan
    vegan: true
    tags:
