    notes:
      - category: ai
        note: >-
          CW12060 is a signature mold 'The Duel' designed in collaboration with Paul Wagemaker. Features 21 cavities in
          3x7 grid layout. Cavity dimensions consistently listed as 30x30x20.5 mm with 14g chocolate capacity across
          sources (Vantage House, Pastry Chefs Boutique, Chocolate World catalog excerpts, Sweetlink). Mold frame:
          275x135x26 mm, confirming series-1000 format. Described as a modern square/tapered praline shape suitable for
          bonbons. Video demo available on Chocolate World's YouTube.
