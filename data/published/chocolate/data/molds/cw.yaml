  chocolate-world-cw1301:
    baseId: chocolate-world-cw1301
    manufacturer: Chocolate World
    productNumber: CW1301
    name: Wiro
    description: >-
      Polycarbonate chocolate mold featuring hexagonal or square cavities with a spiral 'wiro' swirl design on the
      bottom, creating elegant pralines or bonbons with decorative texture
    cavities:
      kind: grid
      columns: 8
      rows: 3
      info:
        weight: 10
        dimensions:
          width: 30
          length: 30
          depth: 16
    format: series-1000
    tags:
      - bonbon
      - praline
      - swirl
      - hexagonal
      - wiro
      - polycarbonate
      - fantasy
    notes:
      - category: ai
        note: >-
          Cavity dimensions Ø30x16 mm (circular/round base with swirl, listed as 30x30x16 mm in rectangular
          approximation) from multiple retailer specs and catalog. Weight per cavity 10g consistent across sources.
          Layout 3 rows x 8 columns for 24 cavities in series-1000 (275x135 mm) frame, mold height 24 mm. Shape named
          'Wiro' referring to spiral/swirl design, often categorized under fantasy or modern pralines; same model as
          CW2227 in series-2000. Dimensions are internal cavity specs; weight based on solid milk chocolate molding.
    urls:
      - category: manufacturer
        url: https://www.chocolateworld.be/winkel/vormen/kadervormen/CW1301
