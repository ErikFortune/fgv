  cocoa-butter:
    baseId: cocoa-butter
    name: Cocoa Butter
    ganacheCharacteristics:
      cacaoFat: 100
      sugar: 0
      milkFat: 0
      water: 0
      solids: 0
      otherFats: 0
    description: >-
      Pure edible fat extracted from cocoa beans (Theobroma cacao), consisting almost entirely of triglycerides
      (primarily saturated and monounsaturated fats like stearic, oleic, and palmitic acids). Pale yellow, solid at room
      temperature with a melting point around 34-38°C, used in ganache to thin mixtures, enhance snap/crispness, add
      gloss, and stabilize emulsions. Neutral flavor (deodorized versions) or mild cocoa aroma.
    certifications:
      - vegan
    vegan: true
    tags:
      - fat
      - cacao-fat
      - chocolate-making
      - tempering
      - vegan-fat
    density: 0.9
    category: fat
    meltingPoint: 35
